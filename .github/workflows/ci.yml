# .github/workflows/ci.yml
# Continuous Integration Workflow for shad360
# Handles building, testing, and linting across Windows, Linux, and macOS natively.

name: CI

# Trigger the workflow on push to any branch, pull request to any branch, or manual dispatch
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

# Define global environment variables for consistency
env:
  BUILD_TYPE: Release
  DOTNET_VERSION: "10.0.x"
  PYTHON_VERSION: "3.11"
  CMAKE_VERSION: "3.28.3"
  NINJA_VERSION: "1.11.1"

jobs:
  build:
    name: Build & Test (${{ matrix.os }}, ${{ matrix.arch }})
    # The job runs natively on the specified OS runner
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            runner: windows-latest
            arch: x64
            artifact_name: windows-x64
            archive_ext: zip
            cmake_d3d12: ON
          - os: linux
            runner: ubuntu-latest
            arch: x64
            artifact_name: linux-x64
            archive_ext: tar.gz
            cmake_d3d12: OFF
          - os: macos
            runner: macos-latest
            arch: x64
            artifact_name: macos-x64
            archive_ext: tar.gz
            cmake_d3d12: OFF
          - os: macos
            runner: macos-latest
            arch: arm64
            artifact_name: macos-arm64
            archive_ext: tar.gz
            cmake_d3d12: OFF

    # Set explicit GitHub Actions permissions (least privilege)
    permissions:
      contents: read
      actions: read
      checks: write
      security-events: write

    steps:
      # Step 1: Check out the repository and all submodules recursively
      - name: Checkout Repository
        uses: actions/checkout@v4.1.1
        with:
          submodules: recursive
          fetch-depth: 0

      # Step 2: Install Python (required for scripts/tests and cppcheck integration)
      - name: Setup Python
        uses: actions/setup-python@v7.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Step 3: Cache pip packages to speed up workflow execution
      - name: Cache pip
        uses: actions/cache@v4.0.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-

      # Step 4: Install CMake and Ninja build systems
      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@v3.28.3
        with:
          cmakeVersion: ${{ env.CMAKE_VERSION }}
          ninjaVersion: ${{ env.NINJA_VERSION }}

      # Step 5: Setup .NET 10 SDK for the Avalonia frontend
      - name: Setup .NET
        uses: actions/setup-dotnet@v4.0.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Step 6: Cache NuGet packages to reduce external dependencies and build times
      - name: Cache NuGet
        uses: actions/cache@v4.0.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ matrix.arch }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-${{ matrix.arch }}-

      # Step 7: Cache CMake build directory to speed up incremental builds
      - name: Cache CMake Build
        uses: actions/cache@v4.0.0
        with:
          path: |
            build
            ${{ github.workspace }}/.cache
          key: ${{ runner.os }}-cmake-${{ matrix.arch }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
          restore-keys: |
            ${{ runner.os }}-cmake-${{ matrix.arch }}-

      # Step 8: Install Vulkan SDK and dependencies per OS using official package managers
      - name: Install Vulkan Dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install vulkan-sdk -y --no-progress
          echo "VULKAN_SDK=C:\VulkanSDK" >> $env:GITHUB_ENV

      - name: Install Vulkan Dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev libgl1-mesa-dev xorg-dev

      - name: Install Vulkan Dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install vulkan-headers vulkan-loader
          echo "VULKAN_SDK=$(brew --prefix)" >> $GITHUB_ENV

      # Step 9: Install cppcheck for static analysis
      - name: Install cppcheck
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            choco install cppcheck -y --no-progress
          elif [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt-get install -y cppcheck
          elif [ "$RUNNER_OS" == "macOS" ]; then
            brew install cppcheck
          fi

      # Step 10: Restore NuGet packages for the frontend
      - name: Restore NuGet Packages
        run: dotnet restore src/frontend/shad360-frontend.sln

      # Step 11: Configure CMake for the native backend
      - name: Configure CMake
        shell: bash
        run: |
          mkdir -p build
          cmake -B build -S src/backend -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DSHAD360_ENABLE_VULKAN=ON \
            -DSHAD360_ENABLE_AUDIO=ON \
            -DSHAD360_ENABLE_D3D12=${{ matrix.cmake_d3d12 }} \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      # Step 12: Build the native C++ backend using Ninja
      - name: Build Native Backend
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      # Step 13: Build the .NET Avalonia frontend
      - name: Build Frontend
        run: dotnet build src/frontend/shad360-frontend.sln --configuration ${{ env.BUILD_TYPE }} --no-restore

      # Step 14: Run backend tests using CTest
      - name: Run Backend Tests
        run: ctest --test-dir build --build-config ${{ env.BUILD_TYPE }} --output-on-failure

      # Step 15: Run frontend tests using dotnet test
      - name: Run Frontend Tests
        run: dotnet test src/frontend/shad360-frontend.sln --configuration ${{ env.BUILD_TYPE }} --no-build --verbosity normal

      # Step 16: Run clang-format to ensure C/C++ code style compliance
      - name: Run clang-format
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            choco install llvm -y --no-progress
          elif [ "$RUNNER_OS" == "macOS" ]; then
            brew install clang-format
          else
            sudo apt-get install -y clang-format
          fi
          find src/backend -name '*.cpp' -o -name '*.h' | xargs clang-format --dry-run --Werror

      # Step 17: Run dotnet format to ensure C# code style compliance
      - name: Run dotnet format
        run: dotnet format src/frontend/shad360-frontend.sln --verify-no-changes --verbosity detailed

      # Step 18: Run cppcheck for static analysis on the C/C++ codebase
      - name: Run cppcheck
        shell: bash
        run: |
          cppcheck --project=build/compile_commands.json \
            --enable=warning,performance,portability \
            --suppress=missingIncludeSystem \
            --error-exitcode=1 \
            --inline-suppr

      # Step 19: Run Trivy filesystem security scan on the repository and build outputs
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@0.19.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'

      # Step 20: Upload Trivy SARIF results to GitHub Security tab
      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3.24.6
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      # Step 21: Prepare artifact directory structure for packaging
      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p artifacts/${{ matrix.artifact_name }}
          
          if [ "$RUNNER_OS" == "Windows" ]; then
            # Windows artifacts
            cp -r build/bin/* artifacts/${{ matrix.artifact_name }}/
            cp -r src/frontend/bin/Release/* artifacts/${{ matrix.artifact_name }}/
          else
            # Linux and macOS artifacts
            cp -r build/bin/* artifacts/${{ matrix.artifact_name }}/
            cp -r src/frontend/bin/Release/* artifacts/${{ matrix.artifact_name }}/
          fi

      # Step 22: Upload the packaged build artifact for use in the release workflow
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4.3.1
        with:
          name: shad360-${{ matrix.artifact_name }}
          path: artifacts/${{ matrix.artifact_name }}/
          retention-days: 7
          if-no-files-found: error
