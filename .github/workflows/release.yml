# .github/workflows/release.yml
# Release Workflow for shad360
# Triggered on version tags (e.g., v1.0.0) to package and publish GitHub Releases.
# Does NOT rebuild the project; strictly uses artifacts generated and uploaded by ci.yml.

name: Release

on:
  push:
    tags:
      - "v*"

# Define global environment variables
env:
  ARTIFACT_DIR: release_artifacts

jobs:
  package:
    name: Package & Release (${{ matrix.config.artifact_name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - artifact_name: windows-x64
            archive_name: shad360-${{ github.ref_name }}-win-x64.zip
          - artifact_name: linux-x64
            archive_name: shad360-${{ github.ref_name }}-linux-x64.tar.gz
          - artifact_name: macos-x64
            archive_name: shad360-${{ github.ref_name }}-macos-x64.tar.gz
          - artifact_name: macos-arm64
            archive_name: shad360-${{ github.ref_name }}-macos-arm64.tar.gz

    # Required to create GitHub Releases
    permissions:
      contents: write
      actions: read

    steps:
      # Step 1: Check out the repository (required for git context and auto-generated release notes)
      - name: Checkout Repository
        uses: actions/checkout@v4.1.1

      # Step 2: Download the specific CI artifact for this matrix entry
      - name: Download CI Artifact
        uses: actions/download-artifact@v4.1.4
        with:
          name: shad360-${{ matrix.config.artifact_name }}
          path: ${{ env.ARTIFACT_DIR }}/${{ matrix.config.artifact_name }}

      # Step 3: Package the artifact into the required archive format (ZIP for Windows, tar.gz for Linux/macOS)
      - name: Archive Artifact
        shell: bash
        run: |
          cd ${{ env.ARTIFACT_DIR }}/${{ matrix.config.artifact_name }}
          
          if [[ "${{ matrix.config.archive_name }}" == *.zip ]]; then
            zip -r ../${{ matrix.config.archive_name }} .
          else
            tar -czf ../${{ matrix.config.archive_name }} .
          fi

      # Step 4: Publish the GitHub Release with auto-generated notes and upload the archive.
      # We use `softprops/action-gh-release` which handles the creation and asset upload gracefully.
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3.0.2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ env.ARTIFACT_DIR }}/${{ matrix.config.archive_name }}
          fail_on_unmatched_files: true
