# Dependabot configuration for shad360
version: 2
updates:
  # .NET dependencies
  - package-ecosystem: "nuget"
    directory: "/src/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "nuget"

  # CMake/C++ dependencies (via git submodules in third_party)
  - package-ecosystem: "gitsubmodule"
    directory: "/src/backend/third_party"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    labels:
      - "dependencies"
      - "submodule"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    labels:
      - "dependencies"
      - "github-actions"

  # Docker (for CI containers)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    labels:
      - "dependencies"
      - "docker"